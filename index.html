<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Expense Tracker</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="title">
	<div>
		<h1>Expense Tracker</h1>
	</div>
	<div>
		<section class="search-panel">
			<form id="search-form" class="search-form">
				<div class="form-row">
					<input type="text" id="search-name" name="searchName" placeholder="Search Name...">
					<label for="search-category">Search Category:</label>
					<select id="search-category" name="searchCategory"></select>

					<div class="form-actions">
						<button type="submit">Search</button>
						<button type="button" id="reset-search">Reset</button>
						<button type="button" id="sort-by-name">Sort By Name</button>
						<button type="button" id="sort-by-amount">Sort By Amount</button>
					</div>
				</div>
			</form>
		</section>
	</div>
</div>

<div class="app-container">
	<!-- LEVA STRANA: UNOS -->
	<aside class="input-section">
		<h2>Add New Expense</h2>
		<div class="card">
			<p id="status-expense" style="color: red; min-height: 20px; margin: 0;"></p>
			<input type="text" id="name" placeholder="Expense name" autofocus>
			<p id="status-amount" style="color: red; min-height: 20px; margin: 0;"></p>
			<input type="number" id="amount" min="0" placeholder="Amount">
			<label for="category">Categories</label>
			<select id="category">
			</select>
			<button id="addBtn">Add Expense</button>
		</div>

		<div class="total-card">
			<h3>Total: <span id="total">0</span></h3>
		</div>
	</aside>

	<!-- DESNA STRANA: LISTA -->
	<main class="list-section">
		<h2 id="history-date"></h2>
		<div id="expenses-div"></div>
	</main>
</div>

<!-- Modal -->
<div id="myModal" style="display: none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
	<div style="background:white; margin:15% auto; padding:20px; width:300px;">
		<h3>Change Value</h3>
		<input type="text" id="edit-name" placeholder="Edit expense" autofocus>
		<input type="number" id="edit-amount" min="0" placeholder="Edit amount" style="margin: 10px 0 10px;">
		<label for="edit-category" style="display: block; margin-bottom: 5px;">Categories</label>
		<select id="edit-category" style="margin-bottom: 15px;"></select>
		<button id="save-btn">Save</button>
		<button id="close-btn">Cancel</button>
	</div>
</div>


<script src="app.js" type="module"></script>
</body>
</html>
